name: Deploy static content to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted]   # 别用 self-hosted，容易环境不干净

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: install
        run: pnpm install
        
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'   # 确保 build 输出在这里

      - name: Deploy
        uses: actions/deploy-pages@v5
